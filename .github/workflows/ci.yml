name: CI

on: [push, pull_request]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        nim: [2.2.8]
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install Nim
        uses: iffy/install-nim@v4
        with:
          version: ${{ matrix.nim }}
      - name: Build
        run: nimble install -y
      - name: Test
        run: nimble test -y
